[package]
name = "model3d"
edition = "2024.beta"
license = "Apache-2.0"
authors = ["overflow2026 hackathon team"]

# Walrus testnet dep — uses the deployed-artifact subtree (D-021).
# `testnet-contracts/walrus/Published.toml` on `main` carries `published-at`
# metadata which Sui CLI 1.72.1 reads natively. The mistake to avoid:
# `contracts/walrus@testnet` is the SOURCE tree (intentionally walrus = "0x0",
# re-published on upgrades) — not the deployed artifact.
# WAL flows transitively from the same subtree.
[dependencies]
Walrus = { git = "https://github.com/MystenLabs/walrus.git", subdir = "testnet-contracts/walrus", rev = "main" }

[addresses]
model3d = "0x0"

[dev-dependencies]

[dev-addresses]
