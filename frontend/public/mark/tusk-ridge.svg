<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 84" fill="none" role="img" aria-label="Tusk3D topology mark">
  <!--
    S3 topology identity mark (plan-025). A Joy-Division "Unknown Pleasures"
    ridgeline rendered into a tapered tusk silhouette: a few stacked horizontal
    contour lines, clipped to the tusk profile, peaking along its spine. Black
    ink on transparent so it sits on the paper (#F5F5F0) masthead — INVERTED
    from the paper-on-black lifecycle SVGs. Few, well-separated lines so the
    stripes still read at ~28-30px. Zero orange accent (D-044; budget full).
  -->
  <defs>
    <clipPath id="tuskRidgeClip">
      <path d="M 22 27 C 50 14 88 22 116 52 C 92 44 68 45 50 52 C 37 57 27 62 21 66 C 14 53 15 37 22 27 Z"/>
    </clipPath>
  </defs>
  <!-- tapered tusk outline: thick rounded base at left, point at lower right -->
  <path d="M 22 27 C 50 14 88 22 116 52 C 92 44 68 45 50 52 C 37 57 27 62 21 66 C 14 53 15 37 22 27 Z"
        stroke="#000000" stroke-width="3" stroke-linejoin="round"/>
  <!-- stacked ridgelines, clipped to the tusk; the control-point x migrates so
       the peak drifts line-to-line (the topographic Unknown Pleasures feel). -->
  <g clip-path="url(#tuskRidgeClip)" stroke="#000000" stroke-width="2.4" stroke-linecap="square">
    <path d="M 10 31 Q 54 22 120 33"/>
    <path d="M 10 39 Q 60 30 120 42"/>
    <path d="M 10 47 Q 54 39 120 50"/>
    <path d="M 10 55 Q 44 48 120 57"/>
    <path d="M 10 62 Q 34 57 120 64"/>
  </g>
</svg>
